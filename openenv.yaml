name: email-triage-env
version: "1.0.0"
description: >
  An AI agent benchmark environment where agents learn to prioritize, categorize,
  and route emails using contextual understanding. Agents receive realistic email
  threads and must make triage decisions under time pressure.
author: email-triage-team
license: MIT
tags:
  - openenv
  - email
  - triage
  - nlp
  - real-world

tasks:
  - name: priority-classification
    description: >
      Classify incoming emails by urgency (critical/high/medium/low) based on
      sender, subject, content, and context clues. Easy difficulty.
    difficulty: easy
    max_steps: 10
    score_range: [0.0, 1.0]

  - name: category-routing
    description: >
      Categorize emails into departments (support/billing/sales/legal/hr/engineering)
      AND assign correct priority, then route to the right team queue.
      Medium difficulty with partial credit for correct category OR priority.
    difficulty: medium
    max_steps: 15
    score_range: [0.0, 1.0]

  - name: full-triage-pipeline
    description: >
      Complete triage pipeline: classify priority, route to department, extract
      action items, set SLA deadline, detect sentiment, and flag PII/compliance issues.
      Hard difficulty requiring all fields to be correct for full score.
    difficulty: hard
    max_steps: 20
    score_range: [0.0, 1.0]

observation_space:
  type: object
  fields:
    email_id: string
    subject: string
    sender: string
    sender_domain: string
    body: string
    timestamp: string
    thread_length: integer
    has_attachments: boolean
    step: integer
    previous_actions: list
    feedback: string

action_space:
  type: object
  fields:
    priority:
      type: enum
      values: [critical, high, medium, low]
    category:
      type: enum
      values: [support, billing, sales, legal, hr, engineering, spam, other]
    route_to:
      type: string
      description: Team queue identifier
    action_items:
      type: list
      description: Extracted action items from the email
    sla_hours:
      type: integer
      description: SLA deadline in hours
    sentiment:
      type: enum
      values: [positive, neutral, negative, urgent]
    flags:
      type: list
      description: Compliance flags (pii, legal_risk, financial, escalate)
    reasoning:
      type: string
      description: Agent's reasoning for the triage decision

reward:
  type: continuous
  range: [0.0, 1.0]
  description: >
    Weighted combination of correctness across all triage dimensions.
    Partial credit awarded for each correct field. Bonuses for speed
    and completeness. Penalties for false escalations and missed critical emails.

endpoint: http://localhost:7860
